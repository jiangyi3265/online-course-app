<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="reportsGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#55efc4;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#00b894;stop-opacity:1" />
        </linearGradient>
        <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.2"/>
        </filter>
    </defs>
    
    <!-- 背景圆角矩形 -->
    <rect x="10" y="10" width="100" height="100" rx="20" ry="20" fill="url(#reportsGradient)" filter="url(#shadow)"/>
    
    <!-- 图表区域 -->
    <g transform="translate(20, 20)">
        <!-- 背景网格 -->
        <g stroke="rgba(255,255,255,0.2)" stroke-width="0.5">
            <line x1="10" y1="15" x2="70" y2="15"/>
            <line x1="10" y1="25" x2="70" y2="25"/>
            <line x1="10" y1="35" x2="70" y2="35"/>
            <line x1="10" y1="45" x2="70" y2="45"/>
            <line x1="10" y1="55" x2="70" y2="55"/>
        </g>
        
        <!-- 柱状图 -->
        <rect x="15" y="40" width="6" height="25" fill="white" rx="2"/>
        <rect x="25" y="30" width="6" height="35" fill="white" rx="2"/>
        <rect x="35" y="20" width="6" height="45" fill="white" rx="2"/>
        <rect x="45" y="35" width="6" height="30" fill="white" rx="2"/>
        <rect x="55" y="25" width="6" height="40" fill="white" rx="2"/>
        
        <!-- 趋势线 -->
        <path d="M18,43 Q28,33 38,23 Q48,38 58,28" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2" stroke-linecap="round"/>
        
        <!-- 坐标轴 -->
        <line x1="10" y1="65" x2="70" y2="65" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <line x1="10" y1="15" x2="10" y2="65" stroke="white" stroke-width="2" stroke-linecap="round"/>
        
        <!-- 轴标记 -->
        <circle cx="18" cy="43" r="2" fill="rgba(255,255,255,0.9)"/>
        <circle cx="28" cy="33" r="2" fill="rgba(255,255,255,0.9)"/>
        <circle cx="38" cy="23" r="2" fill="rgba(255,255,255,0.9)"/>
        <circle cx="48" cy="38" r="2" fill="rgba(255,255,255,0.9)"/>
        <circle cx="58" cy="28" r="2" fill="rgba(255,255,255,0.9)"/>
        
        <!-- 上升箭头 -->
        <path d="M72,18 L75,15 L78,18 M75,15 L75,25" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
</svg>