name: Deploy wk H5

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-wk-h5
  cancel-in-progress: true

env:
  DEPLOY_HOST: 47.108.175.236
  DEPLOY_USER: root
  DEPLOY_PORT: "22"
  DEPLOY_PATH: /www/wwwroot/www.yzzhixue.cn

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build H5
        run: npx uni build -p h5
        env:
          UNI_INPUT_DIR: .

      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          cat > ~/.ssh/deploy_key <<'SSH_KEY'
          ${{ secrets.SERVER_SSH_KEY }}
          SSH_KEY
          grep -q "PRIVATE KEY" ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          : > ~/.ssh/known_hosts

      - name: Upload H5 files
        shell: bash
        run: |
          set -euo pipefail
          test -d dist/build/h5
          test -d static
          rm -rf dist/build/h5/static
          cp -a static dist/build/h5/static
          test -f dist/build/h5/static/home-banner.png
          test -f dist/build/h5/static/courses/zk-yuwen.jpg
          SSH_OPTS="-i ~/.ssh/deploy_key -p $DEPLOY_PORT -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -o ConnectTimeout=20 -o ConnectionAttempts=1 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          SCP_OPTS="-O -i ~/.ssh/deploy_key -P $DEPLOY_PORT -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -o ConnectTimeout=20 -o ConnectionAttempts=1 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          ARCHIVE="wk-h5.tar.gz"

          retry() {
            local max="$1"
            shift
            local i
            for i in $(seq 1 "$max"); do
              if "$@"; then
                return 0
              fi
              [ "$i" = "$max" ] && return 1
              sleep $((i * 10))
            done
          }

          tar -C dist/build/h5 -czf "$ARCHIVE" .
          du -h "$ARCHIVE"
          echo "Creating remote H5 deploy directory..."
          retry 6 timeout 90s ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH' '$DEPLOY_PATH/.deploy'"
          echo "Uploading H5 archive..."
          retry 4 timeout 8m scp $SCP_OPTS "$ARCHIVE" "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.deploy/$ARCHIVE"
          echo "Extracting H5 archive..."
          retry 6 timeout 2m ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "tar -xzf '$DEPLOY_PATH/.deploy/$ARCHIVE' -C '$DEPLOY_PATH' && if id www >/dev/null 2>&1; then chown -R www:www '$DEPLOY_PATH' 2>/dev/null || true; fi"
